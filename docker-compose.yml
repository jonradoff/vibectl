services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - vibectl-mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4380:4380"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - DATABASE_NAME=vibectl
      - PORT=4380
      - ALLOWED_ORIGINS=http://localhost:4370
    depends_on:
      - mongodb

volumes:
  vibectl-mongo-data:
